<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Workflow Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f2f1; color: #201f1e; min-height: 100vh; padding: 20px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #201f1e; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: #fff; border-radius: 8px; padding: 12px 14px; border: 1px solid #e1dfdd; }
  .stat-label { font-size: 11px; color: #605e5c; margin-bottom: 3px; }
  .stat-val { font-size: 22px; font-weight: 600; color: #201f1e; }

  .top-bar { background: #fff; border: 1px solid #e1dfdd; border-radius: 8px; padding: 14px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 10px; }
  .top-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .top-row input[type=text] { flex: 1; min-width: 160px; font-size: 13px; padding: 0 10px; height: 34px; border: 1px solid #c8c6c4; border-radius: 4px; background: #fff; color: #201f1e; outline: none; font-family: inherit; }
  .top-row input[type=text]:focus { border-color: #6264a7; box-shadow: 0 0 0 1px #6264a7; }
  .top-row input[type=date] { font-size: 12px; padding: 0 8px; height: 34px; border: 1px solid #c8c6c4; border-radius: 4px; background: #fff; color: #201f1e; outline: none; font-family: inherit; }
  .top-row select { height: 34px; font-size: 12px; padding: 0 6px; border: 1px solid #c8c6c4; border-radius: 4px; background: #fff; color: #201f1e; outline: none; font-family: inherit; }
  .top-row button { height: 34px; padding: 0 14px; font-size: 13px; border: none; border-radius: 4px; background: #6264a7; color: #fff; cursor: pointer; font-family: inherit; font-weight: 500; white-space: nowrap; }
  .top-row button:hover { background: #4f52a0; }
  textarea#desc-input { width: 100%; font-size: 13px; padding: 8px 10px; border: 1px solid #c8c6c4; border-radius: 4px; background: #fff; color: #201f1e; outline: none; resize: none; height: 60px; line-height: 1.5; font-family: inherit; }
  textarea#desc-input:focus { border-color: #6264a7; box-shadow: 0 0 0 1px #6264a7; }

  .filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-bar label { font-size: 12px; color: #605e5c; }
  .filter-bar select { height: 30px; font-size: 12px; padding: 0 6px; border: 1px solid #c8c6c4; border-radius: 4px; background: #fff; color: #201f1e; outline: none; font-family: inherit; }

  .columns { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; }
  .col { background: #edebe9; border-radius: 8px; padding: 10px; min-height: 320px; }
  .col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .col-title { font-size: 12px; font-weight: 600; color: #201f1e; }
  .col-count { font-size: 11px; background: #fff; border: 1px solid #d2d0ce; border-radius: 99px; padding: 1px 7px; color: #605e5c; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-later { background: #a19f9d; }
  .dot-now { background: #d13438; }
  .dot-preclose { background: #ca5010; }
  .dot-postclose { background: #0078d4; }
  .dot-done { background: #498205; }

  .card { background: #fff; border: 1px solid #e1dfdd; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; cursor: grab; position: relative; }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.35; }
  .card-title { font-size: 13px; font-weight: 600; color: #201f1e; line-height: 1.4; padding-right: 46px; }
  .card-desc { font-size: 12px; color: #605e5c; margin-top: 6px; line-height: 1.5; white-space: pre-wrap; border-top: 1px solid #edebe9; padding-top: 6px; }
  .desc-hint { font-size: 11px; color: #a19f9d; margin-top: 4px; }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 7px; }
  .assignee { font-size: 11px; color: #605e5c; display: flex; align-items: center; gap: 3px; }
  .due { font-size: 11px; display: flex; align-items: center; gap: 3px; }
  .due-ok { color: #605e5c; }
  .due-soon { color: #ca5010; font-weight: 500; }
  .due-over { color: #d13438; font-weight: 600; }

  .card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 2px; opacity: 0; transition: opacity 0.1s; }
  .card:hover .card-actions { opacity: 1; }
  .icon-btn { background: none; border: 1px solid transparent; color: #605e5c; cursor: pointer; font-size: 14px; padding: 3px 5px; border-radius: 4px; line-height: 1; font-family: inherit; }
  .icon-btn:hover { background: #f3f2f1; border-color: #e1dfdd; color: #201f1e; }
  .icon-btn.del:hover { color: #d13438; }

  .drop-zone { border: 2px dashed #c8c6c4; border-radius: 6px; min-height: 48px; display: none; align-items: center; justify-content: center; font-size: 12px; color: #a19f9d; margin-bottom: 8px; }
  .drop-zone.active { display: flex; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 8px; padding: 24px; width: 420px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #201f1e; }
  .modal label { font-size: 12px; color: #605e5c; display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal label:first-of-type { margin-top: 0; }
  .modal input[type=text], .modal input[type=date], .modal select, .modal textarea { width: 100%; font-size: 13px; padding: 7px 10px; border: 1px solid #c8c6c4; border-radius: 4px; background: #fff; color: #201f1e; outline: none; font-family: inherit; }
  .modal input[type=text]:focus, .modal input[type=date]:focus, .modal select:focus, .modal textarea:focus { border-color: #6264a7; box-shadow: 0 0 0 1px #6264a7; }
  .modal textarea { resize: none; height: 90px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .modal-btns button { height: 34px; padding: 0 16px; font-size: 13px; border-radius: 4px; cursor: pointer; font-family: inherit; font-weight: 500; }
  .btn-cancel { background: #fff; border: 1px solid #c8c6c4; color: #201f1e; }
  .btn-cancel:hover { background: #f3f2f1; }
  .btn-save { background: #6264a7; border: none; color: #fff; }
  .btn-save:hover { background: #4f52a0; }

  @media (max-width: 700px) {
    .columns { grid-template-columns: repeat(2, 1fr); }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 420px) {
    .columns { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>Team Workflow Tracker</h1>

<div class="stats" id="stats"></div>

<div class="top-bar">
  <div class="top-row">
    <input type="text" id="task-input" placeholder="Task name…" />
    <select id="assign-select">
      <option value="">Assignee</option>
      <option>Christy</option>
      <option>Joey</option>
      <option>Michael</option>
      <option>Kevin</option><option>Layne</option><option>Robert</option><option>Manny</option>
      <option>Heather</option><option>J Taylor</option><option>Guggenheim</option><option>Steve</option><option>Zach</option>
    </select>
    <select id="col-select">
      <option value="now">Now</option>
      <option value="later">Add for later</option>
      <option value="preclose">Pre close</option>
      <option value="postclose">Post close</option>
    </select>
    <input type="date" id="due-input" title="Due date" />
    <button onclick="addTask()">+ Add task</button>
  </div>
  <textarea id="desc-input" placeholder="What needs to be done… (optional)"></textarea>
</div>

<div class="filter-bar">
  <label>Filter by person:</label>
  <select id="filter-person" onchange="render()">
    <option value="">All people</option>
    <option>Christy</option>
      <option>Joey</option>
      <option>Michael</option>
      <option>Kevin</option><option>Layne</option><option>Robert</option><option>Manny</option>
    <option>Heather</option><option>J Taylor</option><option>Guggenheim</option><option>Steve</option><option>Zach</option>
  </select>
</div>

<div class="columns" id="board"></div>

<!-- Edit Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2>Edit task</h2>
    <label>Task name</label>
    <input type="text" id="m-title" />
    <label>What needs to be done</label>
    <textarea id="m-desc"></textarea>
    <label>Assignee</label>
    <select id="m-assign">
      <option value="">Unassigned</option>
      <option>Christy</option>
      <option>Joey</option>
      <option>Michael</option>
      <option>Kevin</option><option>Layne</option><option>Robert</option><option>Manny</option>
      <option>Heather</option><option>J Taylor</option><option>Guggenheim</option><option>Steve</option><option>Zach</option>
    </select>
    <label>Column</label>
    <select id="m-col">
      <option value="later">Add for later</option>
      <option value="now">Now</option>
      <option value="preclose">Pre close</option>
      <option value="postclose">Post close</option>
      <option value="done">Done</option>
    </select>
    <label>Due date</label>
    <input type="date" id="m-due" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
const COLS = [
  { id: 'later', label: 'Add for later', dot: 'dot-later' },
  { id: 'now', label: 'Now', dot: 'dot-now' },
  { id: 'preclose', label: 'Pre close', dot: 'dot-preclose' },
  { id: 'postclose', label: 'Post close', dot: 'dot-postclose' },
  { id: 'done', label: 'Done', dot: 'dot-done' },
];

const STORAGE_KEY = 'workflow_tracker_tasks';
let tasks = [];
let nextId = 1;
let dragId = null;
let editId = null;

function loadTasks() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      tasks = data.tasks || [];
      nextId = data.nextId || 1;
    }
  } catch(e) {}
}

function saveTasks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, nextId })); } catch(e) {}
}

function dueCls(due) {
  if (!due) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due + 'T00:00:00');
  const diff = (d - today) / 86400000;
  if (diff < 0) return 'due-over';
  if (diff <= 3) return 'due-soon';
  return 'due-ok';
}

function fmtDate(due) {
  if (!due) return '';
  const [y,m,d] = due.split('-');
  return `${m}/${d}/${y.slice(2)}`;
}

function render() {
  const board = document.getElementById('board');
  const fp = document.getElementById('filter-person').value;
  board.innerHTML = '';

  COLS.forEach(col => {
    let colTasks = tasks.filter(t => t.col === col.id);
    if (fp) colTasks = colTasks.filter(t => t.assignee === fp);

    const div = document.createElement('div');
    div.className = 'col';
    div.dataset.col = col.id;
    div.innerHTML = `
      <div class="col-header">
        <div class="dot ${col.dot}"></div>
        <span class="col-title">${col.label}</span>
        <span class="col-count">${colTasks.length}</span>
      </div>
      <div class="drop-zone" id="dz-${col.id}">Drop here</div>
    `;

    colTasks.forEach(t => {
      const dc = dueCls(t.due);
      const card = document.createElement('div');
      card.className = 'card';
      card.draggable = true;
      card.dataset.id = t.id;
      card.innerHTML = `
        <div class="card-actions">
          <button class="icon-btn" onclick="openModal(${t.id})" title="Edit task">✏️</button>
          <button class="icon-btn del" onclick="deleteTask(${t.id})" title="Delete task">✕</button>
        </div>
        <div class="card-title">${t.title}</div>
        ${t.desc ? `<div class="card-desc">${t.desc}</div>` : ''}
        <div class="card-meta">
          ${t.assignee ? `<span class="assignee">👤 ${t.assignee}</span>` : ''}
          ${t.due ? `<span class="due ${dc}">📅 ${fmtDate(t.due)}${dc==='due-over' ? ' !' : ''}</span>` : ''}
        </div>
      `;
      card.addEventListener('dragstart', () => { dragId = t.id; card.classList.add('dragging'); showDropZones(true); });
      card.addEventListener('dragend', () => { dragId = null; card.classList.remove('dragging'); showDropZones(false); });
      div.appendChild(card);
    });

    div.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dz-' + col.id).classList.add('active'); });
    div.addEventListener('dragleave', () => { document.getElementById('dz-' + col.id).classList.remove('active'); });
    div.addEventListener('drop', e => {
      e.preventDefault();
      if (dragId) { tasks = tasks.map(t => t.id == dragId ? {...t, col: col.id} : t); saveTasks(); render(); }
    });

    board.appendChild(div);
  });
  renderStats();
}

function showDropZones(show) {
  COLS.forEach(col => {
    const dz = document.getElementById('dz-' + col.id);
    if (dz) dz.classList.toggle('active', show);
  });
}

function renderStats() {
  const s = document.getElementById('stats');
  const total = tasks.length;
  const now = tasks.filter(t => t.col === 'now').length;
  const done = tasks.filter(t => t.col === 'done').length;
  const today = new Date(); today.setHours(0,0,0,0);
  const overdue = tasks.filter(t => t.due && t.col !== 'done' && new Date(t.due + 'T00:00:00') < today).length;
  s.innerHTML = [
    ['Total tasks', total],
    ['Need now', now],
    ['Overdue', overdue],
    ['Completed', done],
  ].map(([l, v]) => `<div class="stat"><div class="stat-label">${l}</div><div class="stat-val">${v}</div></div>`).join('');
}

function addTask() {
  const input = document.getElementById('task-input');
  const desc = document.getElementById('desc-input');
  const assign = document.getElementById('assign-select');
  const col = document.getElementById('col-select');
  const due = document.getElementById('due-input');
  const title = input.value.trim();
  if (!title) { input.focus(); return; }
  tasks.push({ id: nextId++, title, desc: desc.value.trim(), col: col.value, assignee: assign.value, due: due.value });
  input.value = ''; desc.value = ''; due.value = ''; assign.value = ''; col.value = 'now';
  saveTasks(); render();
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(t => t.id !== id);
  saveTasks(); render();
}

function openModal(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editId = id;
  document.getElementById('m-title').value = t.title;
  document.getElementById('m-desc').value = t.desc || '';
  document.getElementById('m-assign').value = t.assignee || '';
  document.getElementById('m-col').value = t.col;
  document.getElementById('m-due').value = t.due || '';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  editId = null;
}

function saveModal() {
  if (!editId) return;
  tasks = tasks.map(t => t.id === editId ? {
    ...t,
    title: document.getElementById('m-title').value.trim() || t.title,
    desc: document.getElementById('m-desc').value.trim(),
    assignee: document.getElementById('m-assign').value,
    col: document.getElementById('m-col').value,
    due: document.getElementById('m-due').value,
  } : t);
  closeModal(); saveTasks(); render();
}

document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === document.getElementById('modal-bg')) closeModal(); });

loadTasks();
render();
</script>
</body>
</html>
